# Two-instance demo on a shared docker network. Each agent's
# `PUBLIC_BASE_URL` uses the other's service name, so contact codes
# generated by one resolve from the other.
#
# Setup:
#   1. cp .env.compose.example .env  (fill the keys + a shared API_TOKEN)
#   2. docker compose up --build
#   3. From the host:
#        TOKEN=$API_TOKEN
#        curl -H "Authorization: Bearer $TOKEN" http://127.0.0.1:4242/api/me   # Will's contact code
#        # paste Will's contact code into Alice's contacts:
#        curl -H "Authorization: Bearer $TOKEN" -H 'content-type: application/json' \
#             -d '{"code":"<paste>","nickname":"will"}' \
#             http://127.0.0.1:4243/api/contacts
#        # symmetric add the other way, then send.

services:
  will:
    build: .
    container_name: a2a-will
    environment:
      PUBLIC_BASE_URL: http://will:4242
      DISPLAY_NAME: will
      AGENT_MASTER_KEY: ${WILL_MASTER_KEY}
      PORT: "4242"
      HOST: 0.0.0.0
      ALLOW_INSECURE_HTTP: "true"
      API_TOKEN: ${API_TOKEN}
      LOG_LEVEL: info
    ports:
      - "4242:4242"
    volumes:
      - will-data:/app/data
    networks:
      - a2a

  alice:
    build: .
    container_name: a2a-alice
    environment:
      PUBLIC_BASE_URL: http://alice:4243
      DISPLAY_NAME: alice
      AGENT_MASTER_KEY: ${ALICE_MASTER_KEY}
      PORT: "4243"
      HOST: 0.0.0.0
      ALLOW_INSECURE_HTTP: "true"
      API_TOKEN: ${API_TOKEN}
      LOG_LEVEL: info
    ports:
      - "4243:4243"
    volumes:
      - alice-data:/app/data
    networks:
      - a2a

volumes:
  will-data:
  alice-data:

networks:
  a2a:
    driver: bridge
